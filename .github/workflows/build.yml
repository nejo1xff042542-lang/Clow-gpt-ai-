name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create .env file
      run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK (Automatic Path Fix)
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew assembleDebug
        elif [ -f "./app/gradlew" ]; then
          cd app && ./gradlew assembleDebug
        else
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Gradlew file nahi mili!" && exit 1
          fi
          cd $(dirname "$GRADLEW_PATH") && ./gradlew assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: clow-gpt-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
